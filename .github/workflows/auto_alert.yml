name: JM72 Auto Alert Robot

on:
  schedule:
    - cron: '0 * * * *'  # يعمل تلقائياً في بداية كل ساعة
  workflow_dispatch:      # يسمح لك بتشغيله يدوياً من GitHub في أي وقت

jobs:
  run-alert-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas streamlit requests

      - name: Run Alert Logic
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }} # سنقوم بضبطها في الخطوة التالية
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python auto_alert.py
